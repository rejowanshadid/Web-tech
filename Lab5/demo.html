<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Registration </title>
</head>
<body>
    <h1 style="text-align: center;">Registration Form</h1>

    <style>
    body{
        background-color: lightblue;
    }

    .general-info{
        border: 2px solid blue;
        border-radius: 5px;
    }

    .file-box{
    border: 1px solid blue;
    padding: 2px;
    width: 200px;
}

    .contact-info{
        border: 2px solid blue;
        border-radius: 5px;
    }
    .present-address{
        border: 2px solid blue;
        border-radius: 5px;
    }

    .account-info{
        border: 2px solid blue;
        border-radius: 5px;
        background-image: url(demo.jpg);
        background-size: cover; 
    }

    input:focus,
    select:focus,
    textarea:focus{
        background-color:  rgb(210, 236, 234);} 





     .register-btn{
    background-color: blue;
    margin-top: 20px;
   
   
}
</style>

<table>
    <tr>
        <td>
            <fieldset class="general-info">
                <legend>General Information</legend>
                <label for="firstName">First Name</label>
                : <input type="text" id="firstName" name="firstName">
                <br><br>
                    <label for="lastName">Last Name</label>
                    : <input type="text" id="lastName" name="lastName">
            
                    <br><br>
                    <label>Gender:</label>
                    
                        <input type="radio" id="male" name="Gender" value="male">
                        <label for="male">Male</label>

                        
                        <input type="radio" id="female" name="Gender" value="female">
                        <label for="female">Female</label>
                        <br><br>

                        <label for="fatherName">Father's Name</label>
                    : <input type="text" id="fatherName" name="fatherName">
                    
                                <input type="file" id="fileName" class="file-box">

                            
                    <br><br>
                    <label for="motherName">Mother Name</label>
                    : <input type="text" id="motherName" name="motherName">
            
                    <br><br>
                    <label for="bloodGroup">Blood Group</label>
                    <select name="bloodGroup" id="bloodgroup">
                            <option value ="A+">A+</option>
                            <option value ="B+">B+</option>
                            <option value ="AB+">AB+</option>
                            <option value ="O+">O+</option>
                            <option value ="A-">A-</option>
                            <option value ="Ab-">AB-</option>
                            <br><br>
                        </select> 
                    <br><br>
                        <label for="Religion">Religion</label>
                        <select name="Religion" id="Religion">
                            <option value ="Muslim">Muslim</option>
                            <option value ="Hindu">Hindu</option>
                            <option value ="others">others</option>
                </fieldset>
            </td>




            <td>
                <fieldset class="contact-info">
                    <legend>Contact Information</legend>
                    <label for="email"> Email</label>
                    : <input type="text" id="email" name="email">
                    <br><br>
                    <label for="phone"> Phone</label>
                    : <input type="text" id="email" name="email">
                    <br><br>
                    <label for="website"> Website</label>
                    : <input type="website" id="email" name="website">
                    <br>
                                    
                    
                    <label for="address">Address:</label>
        
                    <fieldset class="present-address">
                        <legend>Present Address</legend>
                        <select name="country" id="country">
                            <option value ="Bnagladesh">Bangladesh</option>
                            <option value ="Nepal">Nepal</option>
                            </select>
                            <select name="division" id="division">
                            <option value ="dhaka">Dhaka</option>
                            <option value ="rangpur">Rangpur</option>
                            </select>
                            <br><br>

                             <label for="road">Road/Street:</label>
                             <textarea id="road" name="road" placeholder="Road/street/city"></textarea>
                             <br><br>

                             <label for="postcode">Post Code</label>
                             : <input type="text" id="postcode" name="postcode" placeholder="Post Code">
                            
                            
            
                            
                        

                    </fieldset>
                    
                    
                    
                    
                </fieldset>
            </td>

            <td>
                <fieldset class="account-info">
                    <legend>Account Information</legend>
                     <label for="user name">User Name</label>
                     : <input type="text" id="userName" name="userName">
                    <br><br>
                    <label for="password">Password</label>
                    : <input type="text" id="password" name="password">
                    <br><br>
                    <label for="confirm password">Confirm Password</label>
                    : <input type="text" id="confirm password" name="confirm password">
                    <br><br>


                </fieldset>
                            <input type="submit" value="Register" class="register-btn">



            </td>


        </tr>
    </table>

</body>
</html>
