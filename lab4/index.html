<!DOCTYPE html>
<html>
    <head>
        <title>CSS Example </title>
       <link rel="stylesheet" href="external.css">
       <style>
        #i1,p{
            border: 5px solid green;
        }
        p{
            border: 2px solid blue;
            color: yellow;
        }
        .c1:hover {
            color: blue;
            cursor:pointer;
        }
        .c2:hover {
            color: pink;
            cursor:pointer;
        }

       </style>
        
    </head>
    <body>
        <h1 class ="c1"> This is heading 1</h1>
        <p id="i1" class="c2">This is paragraph</p>
        <p>This is paragraph 2</p>
    </body>
</html>
