<!DOCTYPE html>
<html>
    <head>
        <title>CSS Example </title>
        <style>
            p{
                border: 5px solid red;
                display: inline-block;
                height : 100px;
            }
            span{
                border: 5px solid red;
                display: inline-block;
                height : 100px;

            }
        </style>
    </head>
    
    <body>
        <p>This is block element</p>
        <span>This is inline element</span>
    </body>
</html>
